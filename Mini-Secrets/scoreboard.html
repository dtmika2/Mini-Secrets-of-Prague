<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Scoreboard — Secrets of Prague</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cagliostro&family=Cinzel:wght@400;600;700;900&family=Raleway:wght@300;400;500;600;700&display=swap');

    @font-face {
      font-family: 'Modern Antiqua';
      src: url('modern-antiqua/ModernAntiqua-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #070b12;
      --bg2:        #0e1521;
      --gold:       #d4a84b;
      --gold-dark:  #9a6e10;
      --gold-light: #f0d080;
      --text:       #e4dcc8;
      --text-dim:   #8a7e68;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Raleway', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .screen {
      width: 100vw; height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5vh 5vw;
      gap: 2.2vh;
      background:
        radial-gradient(ellipse 80% 60% at 50% 20%, #141e32 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 80%, #0c1428 0%, transparent 60%),
        var(--bg);
    }

    /* ── TYPOGRAPHY ── */
    .heading {
      font-family: 'Modern Antiqua', serif;
      font-weight: 900;
      color: var(--gold);
      text-align: center;
      letter-spacing: 0.25em;
      text-shadow: 0 0 40px rgba(212,168,75,0.35);
    }
    .heading-lg { font-size: 3.8vw; }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      width: 70vw;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,168,75,0.5), transparent);
    }
    .divider-icon { color: var(--gold); font-size: 1.5vw; }

    /* ── LIVE INDICATOR ── */
    .live-row {
      display: flex;
      align-items: center;
      gap: 0.6em;
    }
    .live-dot {
      width: 1vw; height: 1vw;
      border-radius: 50%;
      background: #58c458;
      box-shadow: 0 0 8px rgba(88,196,88,0.9);
      animation: livePulse 2s ease-in-out infinite;
    }
    .live-label {
      font-family: 'Modern Antiqua', serif;
      font-size: 1.4vw;
      color: var(--text-dim);
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }
    @keyframes livePulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.65); }
    }

    /* ── SCOREBOARD TABLE ── */
    .sb-wrap {
      width: 88vw;
      max-height: 68vh;
      overflow-y: auto;
      border: 1px solid rgba(212,168,75,0.2);
      border-radius: 6px;
      background: rgba(255,255,255,0.02);
    }
    .sb-wrap::-webkit-scrollbar { width: 5px; }
    .sb-wrap::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 3px; }

    .sb-table {
      width: 100%;
      border-collapse: collapse;
    }
    .sb-table thead {
      position: sticky;
      top: 0;
      background: rgba(14,21,33,0.96);
      backdrop-filter: blur(4px);
    }
    .sb-table th {
      font-family: 'Modern Antiqua', serif;
      font-size: 1.5vw;
      color: var(--gold);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 1em 1.4em;
      text-align: left;
      border-bottom: 1px solid rgba(212,168,75,0.25);
    }
    .sb-table td {
      font-family: 'Cagliostro', 'Raleway', sans-serif;
      font-size: 1.8vw;
      color: var(--text);
      padding: 0.9em 1.4em;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .sb-table tr:last-child td { border-bottom: none; }

    .sb-table .r1 td:first-child { color: #ffd700; font-size: 1.1em; }
    .sb-table .r2 td:first-child { color: #c0c0c0; }
    .sb-table .r3 td:first-child { color: #cd7f32; }

    .sb-empty {
      padding: 3em;
      text-align: center;
      color: var(--text-dim);
      font-style: italic;
      font-size: 1.5vw;
    }
  </style>
</head>
<body>
<div class="screen">
  <h1 class="heading heading-lg">SCOREBOARD</h1>
  <div class="divider"><span class="divider-icon">✦</span></div>
  <div class="live-row">
    <span class="live-dot"></span>
    <span class="live-label">Live</span>
  </div>
  <div class="sb-wrap">
    <table class="sb-table">
      <thead>
        <tr><th>#</th><th>Name</th><th>Points</th><th>Correct</th></tr>
      </thead>
      <tbody id="sb-body"></tbody>
    </table>
  </div>
</div>

<script>
const STORE_KEY        = 'miniSecretsScores_v1';
const MAX_QS           = 7;
const SCROLL_SPEED     = 30;   // px / second
const PAUSE_TOP_MS     = 20000;
const PAUSE_BOTTOM_MS  = 5000;

let scrollRAF   = null;
let scrollTimer = null;

function loadScores() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
  catch { return []; }
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function stopScrollCycle() {
  cancelAnimationFrame(scrollRAF);
  clearTimeout(scrollTimer);
  scrollRAF = scrollTimer = null;
}

function startScrollCycle(wrap) {
  stopScrollCycle();
  const maxScroll = wrap.scrollHeight - wrap.clientHeight;
  if (maxScroll <= 0) return;

  function doScrollDown() {
    let last = performance.now();
    function step(now) {
      const dt = now - last; last = now;
      wrap.scrollTop = Math.min(wrap.scrollTop + SCROLL_SPEED * dt / 1000, maxScroll);
      if (wrap.scrollTop < maxScroll) {
        scrollRAF = requestAnimationFrame(step);
      } else {
        scrollTimer = setTimeout(render, PAUSE_BOTTOM_MS);
      }
    }
    scrollRAF = requestAnimationFrame(step);
  }

  scrollTimer = setTimeout(doScrollDown, PAUSE_TOP_MS);
}

function render() {
  stopScrollCycle();
  const wrap  = document.querySelector('.sb-wrap');
  const tbody = document.getElementById('sb-body');
  const rows  = loadScores();

  wrap.scrollTop = 0;

  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="4" class="sb-empty">No scores yet — be the first!</td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map((r, i) => {
    const rank = ['', 'r1', 'r2', 'r3'][i] || '';
    return `<tr class="${rank}">
      <td>${i + 1}</td>
      <td>${esc(r.name)}</td>
      <td>${r.score}</td>
      <td>${r.correct} / ${MAX_QS}</td>
    </tr>`;
  }).join('');

  if (wrap.scrollHeight > wrap.clientHeight) startScrollCycle(wrap);
}

window.addEventListener('storage', e => {
  if (e.key === STORE_KEY) render();
});

setInterval(() => { if (!scrollRAF && !scrollTimer) render(); }, 60000);

render();
</script>
</body>
</html>
